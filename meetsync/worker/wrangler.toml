name = "meetsync-worker"
main = "src/index.ts"
compatibility_date = "2024-12-30"

# D1 database binding
[[d1_databases]]
binding = "DB"
database_name = "meetsync-db"
database_id = "a750c8fe-0b58-410c-b07c-fc2972b2c35d"

# Workers AI binding — gives the worker runtime access to Cloudflare's
# Whisper models (and any other AI model) without needing an API token.
# Used by /internal/transcribe to convert Telegram voice notes to text,
# called from the Trigger.dev turn handler. Bypasses the API-token-scope
# issue that blocks the REST API path.
[ai]
binding = "AI"

# Environment variables (set via wrangler secret or dashboard)
# TELEGRAM_BOT_TOKEN
# TELEGRAM_WEBHOOK_SECRET
# ADMIN_CHAT_ID
# TRIGGERDEV_API_KEY
# TRIGGERDEV_API_URL
# ANTHROPIC_API_KEY
