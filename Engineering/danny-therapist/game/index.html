<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danny DeVito: A Pixel Life</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050505;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
    }
    #game {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #333;
      cursor: default;
      /* Scale up on larger screens while keeping pixel-perfect */
      max-width: 100vw;
      max-height: 100vh;
    }
    #subtitle {
      color: #444;
      font-size: 11px;
      margin-top: 6px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <canvas id="game" width="640" height="480"></canvas>
  <div id="subtitle">WASD / Arrows: Move &nbsp;|&nbsp; Space / Enter: Interact</div>

  <!-- Load order matters: dependencies before dependents -->
  <script src="src/constants.js"></script>
  <script src="src/tile-renderer.js"></script>
  <!-- Sprite system (split by concern; palette defined in sprite-danny.js) -->
  <script src="src/sprite-danny.js"></script>
  <script src="src/sprite-npcs.js"></script>
  <script src="src/sprite-items.js"></script>
  <script src="src/audio-engine.js"></script>
  <script src="src/ambient-effects.js"></script>
  <script src="src/dialog-system.js"></script>
  <script src="src/entity-player.js"></script>
  <script src="src/entity-npc.js"></script>
  <script src="src/map-renderer.js"></script>

  <!-- Scenes (must be before scene-manager which references them) -->
  <script src="src/scenes/scene-asbury-park.js"></script>
  <script src="src/scenes/scene-beauty-school.js"></script>
  <script src="src/scenes/scene-taxi-depot.js"></script>
  <script src="src/scenes/scene-gotham-city.js"></script>
  <script src="src/scenes/scene-paddys-pub.js"></script>

  <!-- Managers (depend on scenes + entities) -->
  <script src="src/scene-manager.js"></script>
  <script src="src/game-engine.js"></script>
</body>
</html>
